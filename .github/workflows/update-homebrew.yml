name: Update Homebrew Cask

on:
  release:
    types: [published]

jobs:
  update-cask:
    runs-on: ubuntu-latest
    steps:
      - name: Get release info
        id: release
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

          DMG_URL="https://github.com/${{ github.repository }}/releases/download/${GITHUB_REF_NAME}/ClaudeRateWidget-${GITHUB_REF_NAME}.dmg"
          echo "dmg_url=$DMG_URL" >> "$GITHUB_OUTPUT"

          curl -sL "$DMG_URL" -o /tmp/release.dmg
          SHA256=$(shasum -a 256 /tmp/release.dmg | awk '{print $1}')
          echo "sha256=$SHA256" >> "$GITHUB_OUTPUT"

      - name: Update cask in homebrew-tap
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          script: |
            const owner = 'hulryung';
            const repo = 'homebrew-tap';
            const path = 'Casks/claude-rate-widget.rb';
            const version = '${{ steps.release.outputs.version }}';
            const sha256 = '${{ steps.release.outputs.sha256 }}';

            const { data: file } = await github.rest.repos.getContent({ owner, repo, path });

            const content = Buffer.from(file.content, 'base64').toString('utf-8');
            const updated = content
              .replace(/version ".*"/, `version "${version}"`)
              .replace(/sha256 ".*"/, `sha256 "${sha256}"`);

            await github.rest.repos.createOrUpdateFileContents({
              owner, repo, path,
              message: `Update claude-rate-widget to v${version}`,
              content: Buffer.from(updated).toString('base64'),
              sha: file.sha,
            });
